name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 3

      - name: Verify scripts parse
        run: godot --headless --script tests/test_runner.gd --quit-after 1 2>&1 || true
        timeout-minutes: 2

  test-lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 3

      - name: Run tests
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 3

      - name: Install gdlint
        run: pip install gdtoolkit

      - name: Lint
        run: gdlint scripts/**/*.gd resources/**/*.gd

  export:
    needs: test-lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_macos.universal.zip
          unzip -q Godot_v4.6.1-stable_macos.universal.zip
          sudo cp -R Godot.app /Applications/Godot.app

      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.6.1.stable
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip -q Godot_v4.6.1-stable_export_templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/4.6.1.stable/

      - name: Import project
        run: /Applications/Godot.app/Contents/MacOS/Godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 3

      - name: Create export presets
        run: |
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/civ-deckbuilder.zip"
          [preset.0.options]
          application/product_name="civ-deckbuilder"
          application/bundle_identifier="com.civ-deckbuilder.game"
          PRESETS

      - name: Build for macOS
        run: |
          mkdir -p build
          /Applications/Godot.app/Contents/MacOS/Godot --headless --export-release "macOS" build/civ-deckbuilder.zip 2>&1
        timeout-minutes: 5

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: civ-deckbuilder-macOS
          path: build/civ-deckbuilder.zip

  screenshots:
    needs: export
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_macos.universal.zip
          unzip -q Godot_v4.6.1-stable_macos.universal.zip
          sudo cp -R Godot.app /Applications/Godot.app

      - name: Import project
        run: /Applications/Godot.app/Contents/MacOS/Godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 3

      - name: Inject screenshot autoload
        run: |
          echo '' >> project.godot
          echo '[autoload]' >> project.godot
          echo 'ScreenshotCapture="*res://scripts/tools/screenshot_capture.gd"' >> project.godot

      - name: Capture screenshots
        run: |
          mkdir -p screenshots
          /Applications/Godot.app/Contents/MacOS/Godot --path . --quit-after 15 2>&1 || true
          ls -la screenshots/
        timeout-minutes: 1

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/screenshot-main.png
            screenshots/screenshot-gallery.png

  publish:
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD)
          IS_STABLE=${{ contains(github.event.head_commit.message, '#stable-release') }}
          if [ "$IS_STABLE" = "true" ]; then
            VERSION="v0.1.${PATCH}"
          else
            VERSION="v0.1.${PATCH}-nightly"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_stable=$IS_STABLE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (stable=$IS_STABLE)"

      - name: Create tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_stable: ${{ steps.version.outputs.is_stable }}

  release:
    needs: [publish, screenshots]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: civ-deckbuilder-macOS
          path: build

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: screenshots
        continue-on-error: true

      - name: Rename artifact with version
        run: |
          TAG="${{ needs.publish.outputs.tag }}"
          mv build/civ-deckbuilder.zip "build/civ-deckbuilder-${TAG}-macOS.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.publish.outputs.tag }}"
          IS_STABLE="${{ needs.publish.outputs.is_stable }}"
          FILES="build/civ-deckbuilder-${TAG}-macOS.zip"
          if [ -f screenshots/screenshot-main.png ]; then
            FILES="$FILES screenshots/screenshot-main.png screenshots/screenshot-gallery.png"
          fi
          if [ "$IS_STABLE" = "true" ]; then
            gh release create "$TAG" $FILES \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --latest
          else
            gh release create "$TAG" $FILES \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --prerelease
          fi

      - name: Update stable tag
        if: needs.publish.outputs.is_stable == 'true'
        run: |
          git tag -f stable
          git push origin stable --force
