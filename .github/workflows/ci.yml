name: Main CI/CD
run-name: "${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 2
      - name: test
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 2
      - name: lint
        run: pip install -q gdtoolkit && gdlint scripts/**/*.gd resources/**/*.gd

  exportmacos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        id: templates-cache
        with:
          path: ~/.local/share/godot/export_templates
          key: export-templates-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: .godot/imported
          key: import-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          if [ ! -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
      - name: export
        run: |
          if [ ! -d .godot/imported ]; then
            godot --headless --editor --quit 2>&1 || true
          fi
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/CivDecks.zip"
          [preset.0.options]
          application/product_name="CivDecks"
          application/bundle_identifier="com.CivDecks.game"
          PRESETS
          mkdir -p build
          godot --headless --export-release "macOS" build/CivDecks.zip 2>&1
        timeout-minutes: 3
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-stable" >> "$GITHUB_OUTPUT"
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: CivDecks-${{ steps.version.outputs.tag }}-macOS
          path: build/CivDecks.zip

  exportweb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/godot/export_templates
          key: export-templates-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: .godot/imported
          key: import-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          if [ ! -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
      - name: export
        run: |
          if [ ! -d .godot/imported ]; then
            godot --headless --editor --quit 2>&1 || true
          fi
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter="*.fbx, *.obj, *.glb, boots.res, Tcuer.png, Tfbot.png, Tibot.png, Tlbot.png, Trcuer.png, Tsuel.png, Ttbot.png, scout.glb, scout_rogue_texture.png"
          export_path="build/web/index.html"
          [preset.0.options]
          variant/thread_support=true
          html/export_icon=true
          progressive_web_app/enabled=false
          PRESETS
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1
          cp scripts/tools/coi-serviceworker.min.js build/web/
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' build/web/index.html
        timeout-minutes: 5
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: CivDecks-web
          path: build/web/

  tag-release:
    needs: [build-test-lint, exportmacos, exportweb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-stable" >> "$GITHUB_OUTPUT"
      - name: announce
        run: echo "::notice::Version ${{ steps.version.outputs.tag }}"
      - name: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          git tag -f stable
          git push origin stable --force
      - name: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: CivDecks-${{ steps.version.outputs.tag }}-macOS
          path: build
      - name: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv build/CivDecks.zip "build/CivDecks-${TAG}-macOS.zip"
          gh release create "$TAG" "build/CivDecks-${TAG}-macOS.zip" \
            --title "$TAG" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --latest

  deploy:
    needs: tag-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: download-web
        uses: actions/download-artifact@v8
        with:
          name: CivDecks-web
          path: build/web
      - name: setup
        run: |
          npm install puppeteer
          mkdir -p screenshots
      - name: capture
        run: node scripts/tools/capture_screenshots.mjs build/web screenshots
        timeout-minutes: 3
        continue-on-error: true
      - name: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TMPDIR=$(mktemp -d)
          git clone --branch gh-pages --depth 1 "$REPO_URL" "$TMPDIR"
          rm -rf "$TMPDIR/play"
          mkdir -p "$TMPDIR/play"
          cp -r build/web/* "$TMPDIR/play/"
          cp scripts/tools/coi-serviceworker.min.js "$TMPDIR/play/"
          cp scripts/tools/gh-pages-index.html "$TMPDIR/index.html"
          if ls screenshots/screenshot-*.jpg >/dev/null 2>&1; then
            cp screenshots/screenshot-*.jpg "$TMPDIR/"
          fi
          cd "$TMPDIR"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Deploy web build and screenshots" || true
          git push
          rm -rf "$TMPDIR"
