name: CI

on:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}

      - name: Install Godot
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi

      - name: Cache import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: import-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 2

      - name: Run tests
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 2

      - name: Lint
        run: pip install -q gdtoolkit && gdlint scripts/**/*.gd resources/**/*.gd

  export:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot + templates
        uses: actions/cache@v4
        id: godot-cache
        with:
          path: |
            /Applications/Godot.app
            ~/Library/Application Support/Godot/export_templates
          key: godot-macos-${{ env.GODOT_VERSION }}

      - name: Install Godot + export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          sudo cp -R Godot.app /Applications/Godot.app
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      - name: Cache import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: import-macos-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-macos-

      - name: Import + export
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot --headless --editor --quit 2>&1 || true
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/civ-deckbuilder.zip"
          [preset.0.options]
          application/product_name="civ-deckbuilder"
          application/bundle_identifier="com.civ-deckbuilder.game"
          PRESETS
          mkdir -p build
          /Applications/Godot.app/Contents/MacOS/Godot --headless --export-release "macOS" build/civ-deckbuilder.zip 2>&1
        timeout-minutes: 3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: civ-deckbuilder-macOS
          path: build/civ-deckbuilder.zip

  release:
    needs: [build-test-lint, export]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: civ-deckbuilder-macOS
          path: build

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PATCH=$(git rev-list --count HEAD)
          IS_STABLE=${{ contains(github.event.head_commit.message, '#stable-release') }}
          if [ "$IS_STABLE" = "true" ]; then
            TAG="v0.1.${PATCH}"
          else
            TAG="v0.1.${PATCH}-nightly"
          fi
          mv build/civ-deckbuilder.zip "build/civ-deckbuilder-${TAG}-macOS.zip"
          git tag "$TAG"
          git push origin "$TAG"
          if [ "$IS_STABLE" = "true" ]; then
            gh release create "$TAG" "build/civ-deckbuilder-${TAG}-macOS.zip" \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --latest
            git tag -f stable
            git push origin stable --force
          else
            gh release create "$TAG" "build/civ-deckbuilder-${TAG}-macOS.zip" \
              --title "$TAG" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --prerelease
          fi

  screenshots:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}

      - name: Install Godot + xvfb
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi

      - name: Import project
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" godot --editor --quit 2>&1 || true

      - name: Capture screenshots
        run: |
          echo -e '\n[autoload]\nScreenshotCapture="*res://scripts/tools/screenshot_capture.gd"' >> project.godot
          mkdir -p screenshots
          timeout 60 xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" godot --path . 2>&1 || true
          cp ~/.local/share/godot/app_userdata/civ-deckbuilder/screenshots/*.png screenshots/ 2>/dev/null || true
          ls -la screenshots/
        timeout-minutes: 2

      - name: Upload screenshots to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          FILES=""
          for f in screenshots/screenshot-*.png; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -n "$FILES" ]; then
            gh release upload "$TAG" $FILES --clobber
          fi
