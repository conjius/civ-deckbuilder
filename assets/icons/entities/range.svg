<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Frown parabola: starts bottom-left, peaks above center, descends toward bottom-right -->
  <path d="M4 56 Q32 4 48 44" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrowhead at end of curve, pointing toward bottom-right -->
  <polygon points="50,48 40,36 44,50" fill="#222"/>
  <!-- X mark at bottom-right corner -->
  <line x1="52" y1="50" x2="62" y2="62" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="52" y2="62" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
</svg>
