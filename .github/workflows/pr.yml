name: PR

on:
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 2
      - name: test
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 2
      - name: lint
        run: pip install -q gdtoolkit && gdlint scripts/**/*.gd resources/**/*.gd

  export:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/godot/export_templates
          key: export-templates-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: .godot/imported
          key: import-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          if [ ! -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
          if [ ! -d .godot/imported ]; then
            godot --headless --editor --quit 2>&1 || true
          fi
      - name: export-macos
        run: |
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/CivDecks.zip"
          [preset.0.options]
          application/product_name="CivDecks"
          application/bundle_identifier="com.CivDecks.game"
          PRESETS
          mkdir -p build
          godot --headless --export-release "macOS" build/CivDecks.zip 2>&1
        timeout-minutes: 3
      - name: export-web
        run: |
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter="*.fbx, *.obj, *.glb, boots.res, Tcuer.png, Tfbot.png, Tibot.png, Tlbot.png, Trcuer.png, Tsuel.png, Ttbot.png, scout.glb, scout_rogue_texture.png"
          export_path="build/web/index.html"
          [preset.0.options]
          variant/thread_support=false
          html/export_icon=true
          progressive_web_app/enabled=false
          PRESETS
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1
          cp assets/boot_logo.png build/web/index.png
          node scripts/tools/patch_web_loading.mjs build/web/index.html
        timeout-minutes: 3
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-nightly" >> "$GITHUB_OUTPUT"
      - name: upload-macos
        uses: actions/upload-artifact@v7
        with:
          name: CivDecks-${{ steps.version.outputs.tag }}-macOS
          path: build/CivDecks.zip
      - name: upload-web
        uses: actions/upload-artifact@v7
        with:
          name: CivDecks-${{ steps.version.outputs.tag }}-web
          path: build/web/

  deploy-preview:
    needs: [build-test-lint, export]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1
      - name: branch-slug
        id: slug
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr 'A-Z' 'a-z')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
      - name: download-web
        uses: actions/download-artifact@v8
        with:
          name: CivDecks-${{ needs.export.outputs.tag }}-web
          path: preview/${{ steps.slug.outputs.slug }}/
      - name: patch-loading
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          rm -f "preview/$SLUG/coi-serviceworker.min.js"
      - name: deploy-preview
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll "preview/$SLUG/"
          git commit -m "Deploy preview/$SLUG from ${{ github.ref_name }}" --allow-empty
          git push
      - name: create-deployment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          URL="https://conjius.github.io/CivDecks/preview/$SLUG/"
          DEPLOY_ID=$(echo '{"ref":"${{ github.head_ref }}","environment":"preview","description":"Preview for ${{ github.head_ref }}","auto_merge":false,"required_contexts":[]}' \
            | gh api "repos/${{ github.repository }}/deployments" \
            -X POST --input - --jq '.id')
          gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
            -X POST \
            -f state="success" \
            -f environment_url="$URL" \
            -f log_url="$URL" \
            -f description="Preview deployed"

  tag-release:
    needs: [build-test-lint, export]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-nightly" >> "$GITHUB_OUTPUT"
      - name: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force
      - name: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: CivDecks-${{ steps.version.outputs.tag }}-macOS
          path: build
      - name: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv build/CivDecks.zip "build/CivDecks-${TAG}-macOS.zip"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "build/CivDecks-${TAG}-macOS.zip" \
            --title "$TAG" \
            --notes "Nightly build from ${{ github.ref_name }}" \
            --prerelease
