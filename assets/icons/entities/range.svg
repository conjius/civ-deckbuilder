<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Frown parabola: bottom-left, peak at top-center, ends earlier on right -->
  <path d="M4 56 Q32 -8 38 32" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrowhead: larger triangle pointing toward bottom-right (toward the X) -->
  <polygon points="34,34 52,46 46,28" fill="#222"/>
  <!-- X mark at bottom-right corner, large -->
  <line x1="47" y1="44" x2="64" y2="64" stroke="#222" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="64" y1="44" x2="47" y2="64" stroke="#222" stroke-width="5.5" stroke-linecap="round"/>
</svg>
