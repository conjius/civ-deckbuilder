<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <g fill="#222" stroke="#222" stroke-width="4" stroke-linejoin="round">
    <!-- Tent body - triangular A-frame -->
    <polygon points="256,60 440,420 72,420"/>
    <!-- Tent opening -->
    <polygon points="256,200 310,420 202,420" fill="#555"/>
    <!-- Center pole top -->
    <line x1="256" y1="40" x2="256" y2="70" stroke="#222" stroke-width="12" stroke-linecap="round"/>
    <!-- Flag on pole -->
    <polygon points="260,42 300,58 260,72" fill="#222" stroke="none"/>
    <!-- Ground line -->
    <line x1="50" y1="420" x2="462" y2="420" stroke="#222" stroke-width="10" stroke-linecap="round"/>
    <!-- Tent side ropes -->
    <line x1="72" y1="420" x2="40" y2="440" stroke="#222" stroke-width="5"/>
    <line x1="440" y1="420" x2="472" y2="440" stroke="#222" stroke-width="5"/>
    <!-- Rope pegs -->
    <circle cx="40" cy="443" r="8" fill="#222"/>
    <circle cx="472" cy="443" r="8" fill="#222"/>
  </g>
</svg>
