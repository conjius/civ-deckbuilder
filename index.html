<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CivDecks</title>
<style>
*{box-sizing:border-box}
body{background:#2a2a2a;color:#e0e0e0;font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;margin:0}
h1{margin-bottom:8px}
.desc{color:#888;margin-bottom:32px}
a{color:#6ea8fe;text-decoration:none}
.shots{display:flex;gap:24px;justify-content:center;align-items:center;max-width:1400px}
.shots img{width:660px;border-radius:8px;border:1px solid #333;cursor:pointer;transition:transform .2s}
.shots img:hover{transform:scale(1.02)}
.links{display:flex;gap:32px;margin-top:36px}
.links a{display:flex;align-items:center;gap:8px;color:#ccc;font-size:15px;transition:color .2s}
.links a:hover{color:#fff}
.links svg{width:20px;height:20px;fill:currentColor}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#2a2a2a;cursor:default;justify-content:center;align-items:center;z-index:10}
.modal.open{display:flex}
.modal img{max-width:85%;max-height:85%;border-radius:8px;cursor:default}
.modal .close{position:fixed;top:24px;right:32px;color:#fff;font-size:66px;cursor:pointer;z-index:11;line-height:1;font-family:system-ui;opacity:.7;transition:opacity .2s}
.modal .close:hover{opacity:1}
.modal .nav{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:168px;cursor:pointer;z-index:11;opacity:.6;transition:opacity .2s;user-select:none;font-family:system-ui}
.modal .nav:hover{opacity:1}
.modal .nav.prev{left:24px}
.modal .nav.next{right:24px}
</style>
</head>
<body style="visibility:hidden">
<script>if(!location.hash)document.body.style.visibility='visible'</script>
<img src="logo.png" alt="CivDecks" style="height:80px;margin-bottom:4px">
<p class="desc">Hex-based civilization strategy game with deckbuilding mechanics</p>
<div class="shots">
<img src="screenshot-main.jpg" alt="Gameplay" onclick="openModal(0)">
<img src="screenshot-gallery.jpg" alt="Gallery" onclick="openModal(1)">
</div>
<div class="links">
<a href="play/"><svg viewBox="0 0 16 16"><path d="M4 2l10 6-10 6V2z"/></svg>Play in Browser</a>
<a href="https://github.com/conjius/CivDecks"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Source</a>
<a href="https://github.com/conjius/CivDecks/releases/latest"><svg viewBox="0 0 16 16"><path d="M7.25 1a.75.75 0 011.5 0v7.19l2.22-2.22a.75.75 0 011.06 1.06l-3.5 3.5a.75.75 0 01-1.06 0l-3.5-3.5a.75.75 0 011.06-1.06l2.22 2.22V1z"/><path d="M2.5 13.5a.75.75 0 010-1.5h11a.75.75 0 010 1.5h-11z"/></svg> Download for macOS</a>
</div>
<div class="modal" id="modal" onclick="closeAndBack()">
<span class="close" onclick="closeAndBack()">&times;</span>
<span class="nav prev" onclick="event.stopPropagation();navigate(-1)">&#8249;</span>
<img id="modalImg" src="" onclick="event.stopPropagation()">
<span class="nav next" onclick="event.stopPropagation();navigate(1)">&#8250;</span>
</div>
<script>
var srcs=['screenshot-main.jpg','screenshot-gallery.jpg']
var keys=['main','gallery']
var currentIdx=0
var modalOpen=false
var openedViaDeepLink=false
function openModal(idx,deepLink){
  currentIdx=idx
  document.getElementById('modalImg').src=srcs[idx]
  document.getElementById('modal').classList.add('open')
  openedViaDeepLink=!!deepLink
  if(!deepLink&&!modalOpen)history.pushState({modal:true},'','#'+keys[idx])
  modalOpen=true
  document.body.style.visibility='visible'
}
function closeModal(){
  if(!modalOpen)return
  modalOpen=false
  document.getElementById('modal').classList.remove('open')
}
function closeAndBack(){
  if(openedViaDeepLink){history.back()}
  else{closeModal();history.replaceState(null,'',location.pathname)}
}
function navigate(dir){
  currentIdx=(currentIdx+dir+srcs.length)%srcs.length
  document.getElementById('modalImg').src=srcs[currentIdx]
  history.replaceState({modal:true},'','#'+keys[currentIdx])
}
window.addEventListener('popstate',function(){closeModal()})
document.addEventListener('keydown',function(e){
  if(!modalOpen)return
  if(e.key==='Escape')closeAndBack()
  else if(e.key==='ArrowLeft')navigate(-1)
  else if(e.key==='ArrowRight')navigate(1)
})
function checkHash(){
  var h=location.hash.slice(1)
  var idx=keys.indexOf(h)
  if(idx>=0)openModal(idx,true)
}
if(location.hash)checkHash()
window.addEventListener('hashchange',function(){
  var h=location.hash.slice(1)
  var idx=keys.indexOf(h)
  if(idx>=0&&!modalOpen)openModal(idx)
  else if(!h)closeModal()
})
</script>
</body>
</html>
