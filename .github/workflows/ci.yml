name: CI/CD
run-name: "${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          godot --headless --editor --quit 2>&1 || true
        timeout-minutes: 2
      - name: test
        run: godot --headless --script tests/test_runner.gd 2>&1
        timeout-minutes: 2
      - name: lint
        run: pip install -q gdtoolkit && gdlint scripts/**/*.gd resources/**/*.gd

  exportmacos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/godot
          key: godot-linux-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        id: templates-cache
        with:
          path: ~/.local/share/godot/export_templates
          key: export-templates-${{ env.GODOT_VERSION }}
      - uses: actions/cache@v5
        with:
          path: .godot/imported
          key: import-${{ hashFiles('**/*.tres', '**/*.tscn', '**/*.gd') }}
          restore-keys: import-
      - name: setup
        run: |
          if [ ! -f /usr/local/bin/godot ]; then
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
            chmod +x /usr/local/bin/godot
          fi
          if [ ! -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
            wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
            mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
      - name: export
        run: |
          if [ ! -d .godot/imported ]; then
            godot --headless --editor --quit 2>&1 || true
          fi
          cat > export_presets.cfg << 'PRESETS'
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/civ-deckbuilder.zip"
          [preset.0.options]
          application/product_name="civ-deckbuilder"
          application/bundle_identifier="com.civ-deckbuilder.game"
          PRESETS
          mkdir -p build
          godot --headless --export-release "macOS" build/civ-deckbuilder.zip 2>&1
        timeout-minutes: 3
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-stable" >> "$GITHUB_OUTPUT"
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: civ-deckbuilder-${{ steps.version.outputs.tag }}-macOS
          path: build/civ-deckbuilder.zip

  tag-release:
    needs: [build-test-lint, exportmacos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: version
        id: version
        run: |
          PATCH=$(($(git rev-list --count HEAD) - 378))
          echo "tag=v0.3.${PATCH}-stable" >> "$GITHUB_OUTPUT"
      - name: announce
        run: echo "::notice::Version ${{ steps.version.outputs.tag }}"
      - name: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          git tag -f stable
          git push origin stable --force
      - name: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: civ-deckbuilder-${{ steps.version.outputs.tag }}-macOS
          path: build
      - name: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv build/civ-deckbuilder.zip "build/civ-deckbuilder-${TAG}-macOS.zip"
          gh release create "$TAG" "build/civ-deckbuilder-${TAG}-macOS.zip" \
            --title "$TAG" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --latest

  screenshots:
    needs: tag-release
    runs-on: [self-hosted, gpu]
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: capture
        shell: bash
        run: |
          set +e
          GODOT="/Applications/Godot.app/Contents/MacOS/Godot"
          cp project.godot project.godot.bak
          echo -e '\n[autoload]\nScreenshotCapture="*res://scripts/tools/screenshot_capture.gd"' >> project.godot
          sed -i '' 's/\[display\]/[display]\nwindow\/size\/initial_position_type=0\nwindow\/size\/initial_position=Vector2i(-4000, -4000)/' project.godot
          $GODOT --headless --editor --quit 2>/dev/null
          mkdir -p screenshots
          CIV_SCREENSHOTS=1 $GODOT --path . --resolution 1920x1080 2>/dev/null &
          PID=$!
          sleep 10
          kill $PID 2>/dev/null
          wait $PID 2>/dev/null
          mv project.godot.bak project.godot
          SS_DIR="$HOME/Library/Application Support/Godot/app_userdata/civ-deckbuilder/screenshots"
          cp "$SS_DIR"/*.png screenshots/ 2>/dev/null
          ls -la screenshots/
          exit 0
      - name: validate
        run: |
          for f in screenshot-main.png screenshot-gallery.png; do
            if [ ! -f "screenshots/$f" ] || [ $(stat -f%z "screenshots/$f") -lt 50000 ]; then
              echo "FAIL: $f missing or blank" && exit 1
            fi
            echo "OK: $f ($(stat -f%z "screenshots/$f") bytes)"
          done
      - name: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TMPDIR=$(mktemp -d)
          git clone --branch gh-pages --depth 1 "$REPO_URL" "$TMPDIR"
          cp screenshots/screenshot-*.png "$TMPDIR/"
          cp scripts/tools/gh-pages-index.html "$TMPDIR/index.html"
          cd "$TMPDIR"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add screenshot-main.png screenshot-gallery.png index.html
          git commit -m "Update screenshots" || true
          git push
          rm -rf "$TMPDIR"
